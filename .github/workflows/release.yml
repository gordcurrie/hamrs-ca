name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hamrs
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: hamrs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hamrs.exe

    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          CARGO=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "${TAG#v}" != "$CARGO" ]; then
            echo "Tag ${TAG} does not match Cargo.toml version ${CARGO}"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.binary }}
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            ARCHIVE=hamrs-${{ github.ref_name }}-${{ matrix.target }}.zip
            7z a "$ARCHIVE" "$BINARY"
          else
            ARCHIVE=hamrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          fi
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
